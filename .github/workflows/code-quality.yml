name: Code Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build report payload
        run: |
          echo '{
            "projectId": "batmanuel",
            "branch": "'"$GITHUB_REF_NAME"'",
            "commit": "'"$GITHUB_SHA"'",
            "sourcePath": "./src"
          }' > report.json

      - name: Send report to Batmanuel
        run: |
          curl -s -X POST "$QUALITY_API_URL/analyze" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $QUALITY_API_TOKEN" \
            -d @report.json \
            -o response.json

          cat response.json
        env:
          QUALITY_API_URL: ${{ secrets.QUALITY_API_URL }}
          QUALITY_API_TOKEN: ${{ secrets.QUALITY_API_TOKEN }}

      - name: Check quality gate (passed/threshold)
        run: |
          PASSED=$(node -e "console.log(require('./response.json').passed)")
          SCORE=$(node -e "console.log(require('./response.json').score)")
          THRESHOLD=$(node -e "console.log(require('./response.json').threshold)")

          echo "Score: $SCORE (threshold: $THRESHOLD)"

          if [ "$PASSED" != "true" ]; then
            echo "Quality gate failed: score $SCORE is below threshold $THRESHOLD."
            exit 1
          fi

          echo "Quality gate passed."
